services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex
      POSTGRES_DB: apex_check_deposit
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_check_deposit"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://apex:apex@postgres:5432/apex_check_deposit?sslmode=disable
      API_PORT: "8080"
      VSS_URL: http://vss:8081
      SETTLEMENT_BANK_URL: http://settlement:8082
      JWT_SECRET: dev-secret-change-in-production
      SETTLEMENT_BANK_TOKEN: dev-settlement-token
      SCENARIOS_PATH: /scenarios/scenarios.yaml
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  vss:
    build:
      context: .
      dockerfile: cmd/vendor-stub/Dockerfile
    ports:
      - "8081:8081"
    environment:
      VSS_PORT: "8081"
      SCENARIOS_PATH: /scenarios/scenarios.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  settlement:
    build:
      context: .
      dockerfile: cmd/settlement-stub/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SETTLEMENT_PORT: "8082"
      API_URL: http://api:8080
      SETTLEMENT_BANK_TOKEN: dev-settlement-token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
