scenarios:
  - name: clean_pass
    description: "Happy path — check passes all validations"
    trigger_account: ALPHA-001
    response:
      iqa_status: "pass"
      iqa_error_type: null
      micr_data:
        routing: "021000021"
        account: "123456789"
        check_number: "1001"
      confidence_score: 0.97
      duplicate_flag: false
      duplicate_original_tx_id: null
    expected_routing: "Analyzing (Funding Service)"

  - name: iqa_fail_blur
    description: "Image quality failure due to blur"
    trigger_account: ALPHA-002
    response:
      iqa_status: "fail"
      iqa_error_type: "blur"
      micr_data: null
      confidence_score: 0.0
      duplicate_flag: false
      duplicate_original_tx_id: null
    expected_routing: "Rejected"

  - name: iqa_fail_glare
    description: "Image quality failure due to glare"
    trigger_account: ALPHA-003
    response:
      iqa_status: "fail"
      iqa_error_type: "glare"
      micr_data: null
      confidence_score: 0.0
      duplicate_flag: false
      duplicate_original_tx_id: null
    expected_routing: "Rejected"

  - name: micr_failure
    description: "MICR read failure — routes to operator review"
    trigger_account: ALPHA-004
    response:
      iqa_status: "pass"
      iqa_error_type: "VSS_MICR_READ_FAIL"
      micr_data: null
      confidence_score: 0.0
      duplicate_flag: false
      duplicate_original_tx_id: null
    expected_routing: "Analyzing (flagged for review)"

  - name: amount_mismatch
    description: "OCR amount does not match submitted amount — routes to operator review"
    trigger_account: ALPHA-005
    response:
      iqa_status: "pass"
      iqa_error_type: "VSS_AMOUNT_MISMATCH"
      micr_data:
        routing: "021000021"
        account: "123456789"
        check_number: "1005"
      ocr_amount_override: 250.00
      confidence_score: 0.92
      duplicate_flag: false
      duplicate_original_tx_id: null
    expected_routing: "Analyzing (flagged for review)"

  - name: duplicate_detected
    description: "Duplicate check detected by vendor service"
    trigger_account: BETA-001
    response:
      iqa_status: "pass"
      iqa_error_type: "VSS_DUPLICATE_DETECTED"
      micr_data:
        routing: "021000021"
        account: "987654321"
        check_number: "2001"
      confidence_score: 0.97
      duplicate_flag: true
      duplicate_original_tx_id: "vss-original-tx-001"
    expected_routing: "Rejected"

  - name: ira_clean_pass
    description: "IRA account — clean pass with contribution type defaulting"
    trigger_account: ALPHA-IRA
    response:
      iqa_status: "pass"
      iqa_error_type: null
      micr_data:
        routing: "021000021"
        account: "111111111"
        check_number: "3001"
      confidence_score: 0.96
      duplicate_flag: false
      duplicate_original_tx_id: null
    expected_routing: "Analyzing (Funding Service)"
